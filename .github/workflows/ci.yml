name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  quick-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/agents/requirements.txt') }}
      - name: Install deps
        run: pip install -r agents/requirements.txt
      - name: Static checks
        run: |
          pip install ruff black
          ruff agents --fix --exit-zero
          black --check .
      - name: Run unit tests
        run: pytest -q agents/tests/test_validator_audit.py agents/tests/test_deploy_compose.py agents/tests/test_task_alias.py --junitxml=results.xml
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: results.xml

  build-and-smoke:
    runs-on: ubuntu-latest
    needs: quick-checks
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install deps (tests)
        run: pip install -r agents/requirements.txt
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Pre-warm Buildx cache for agents
        uses: docker/build-push-action@v4
        with:
          context: ./agents
          file: ./agents/Dockerfile
          push: false
          tags: temp/agents:cache
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build agent images (docker compose)
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1
        run: docker compose build --progress=plain coordinator
      - name: Start minimal services
        run: |
          docker compose up -d ollama zeroclaw coordinator coder tester
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8001/health >/dev/null 2>&1 \
              && curl -fsS http://localhost:8002/health >/dev/null 2>&1 \
              && curl -fsS http://localhost:8004/health >/dev/null 2>&1; then
              echo coordinator, coder, tester healthy && break
            fi
            sleep 2
          done
      - name: Run smoke tests
        run: pytest -q agents/tests/test_smoke.py
      - name: Run Hello-World E2E harness
        run: python3 scripts/hello_world_e2e.py
      - name: Collect logs on failure
        if: failure()
        run: tar czf ci-logs.tgz workspace/logs || true
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: ci-logs.tgz
      - name: Optionally push built images to registry
        if: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && secrets.REGISTRY_USERNAME && secrets.REGISTRY_TOKEN }}
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Push coordinator image (optional)
        if: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && secrets.REGISTRY_USERNAME && secrets.REGISTRY_TOKEN }}
        uses: docker/build-push-action@v4
        with:
          context: ./agents
          file: ./agents/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/$GITHUB_REPOSITORY:coordinator-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans
